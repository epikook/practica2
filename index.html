<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
    </a-assets>
   <img id="suelo" src="suelos.jpg">
   <img id="pared" src="paredes.jpg">
   <img id="viga" src="vigas.jpg">
    </a-assets>
    </a-entity>
      <a-box position="0 0.1 0" rotation="0 0 0" scale="3 0.2 3"  src="#suelo"></a-box>
      <a-box position="0 1.7 -1.4" rotation="0 90 90" scale="3 0.2 3"  src="#pared"></a-box>
      <a-box position="1.4 1.7 0" rotation="0 0 90" scale="3 0.2 3"  src="#pared"></a-box>
    </a-entity>
      <a-sky color="#ECECEC"></a-sky>
      <a-camera position="-3 1 3"></a-camera>
      <a-entity light="type: ambient; color: #FFFFFF"></a-entity>
    </a-scene>
  </body>
</html>
